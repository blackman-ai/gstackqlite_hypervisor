name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BINARY_NAME: gstackqlite-hypervisor

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_ext: zip
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux audio build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release archive (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/package-release.sh

      - name: Build release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${env:VERSION}".TrimStart("v")
          cargo build --release --locked --target "${env:TARGET}"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $stage = Join-Path $env:RUNNER_TEMP "${env:BINARY_NAME}-$version-${env:TARGET}"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item "target/${env:TARGET}/release/${env:BINARY_NAME}.exe" $stage
          Copy-Item README.md $stage
          if (Test-Path LICENSE) {
            Copy-Item LICENSE $stage
          }
          Compress-Archive -Path (Join-Path $stage '*') -DestinationPath "dist/${env:BINARY_NAME}-$version-${env:TARGET}.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: dist/*.${{ matrix.artifact_ext }}

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;

      - name: Generate SHA256SUMS
        run: |
          cd release
          shasum -a 256 * > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
